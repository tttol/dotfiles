interface:
  display_name: "AWS Architecture Evaluator"
  short_description: "AWS構成案の実現性を公式Docsで検証"
  default_prompt: "Use $aws-evaluate-architecture to evaluate whether my architecture idea can be implemented with AWS resources."
dependencies:
  tools:
    - type: "mcp"
      value: "awslabs.aws-documentation-mcp-server@latest"
      description: "Official AWS documentation lookup and recommendation MCP server"
policy:
  allow_implicit_invocation: true
